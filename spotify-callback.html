<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connecting Spotify…</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0d0d0f;
      color: #ede8e3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    p { color: #6b6672; font-size: 14px; }
  </style>
</head>
<body>
  <p id="msg">Connecting Spotify…</p>
  <script>
    const FLASK_URL = "http://localhost:5000";
    const code      = new URLSearchParams(window.location.search).get("code");
    const sessionId = localStorage.getItem("pinclip_session_id");

    (async () => {
      if (!code || !sessionId) {
        document.getElementById("msg").textContent = "Missing code or session — close and try again.";
        return;
      }
      const resp = await fetch(`${FLASK_URL}/spotify/exchange-token`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Session-ID": sessionId
        },
        body: JSON.stringify({ code })
      });

      if (resp.ok) {
        document.getElementById("msg").textContent = "Spotify connected ✓  You can close this tab.";
        // If opened as a popup, signal parent and close
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage("spotify_connected", "*");
          setTimeout(() => window.close(), 1000);
        }
      } else {
        document.getElementById("msg").textContent = "Failed — please try again.";
      }
    })();
  </script>
</body>
</html>
